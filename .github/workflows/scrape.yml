name: V2Ray Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Check out repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: ⚙️ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r config/requirements.txt # <-- pytz is also installed

      - name: 🕸️ Run scraping script
        run: python config/scraper.py

      - name: 🔧 Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: ⬆️ Commit and Push Changes
        run: |
          # 确保我们强制添加所有文件，包括没有内容变化的文件
          # 使用--force参数强制添加，确保所有文件都被包含在提交中
          git add --force output_configs/ README.md update_log.txt

          # 即使没有内容变化，我们也强制提交以更新文件时间戳
          echo "Committing all staged files including directories..."
          # 使用--date选项强制设置所有文件的提交时间为当前时间
          CURRENT_TIME=$(date -u +"%Y-%m-%d %H:%M:%S %z")
          git commit --date="$CURRENT_TIME" -m "docs: Update README and config files"
          git push
